name: Version Bump Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR version
        id: pr
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "PR version: $VERSION"

      - name: Get main version
        id: main
        run: |
          VERSION=$(git show origin/main:cli/Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Main version: $VERSION"

      - name: Compare versions
        run: |
          PR_VERSION="${{ steps.pr.outputs.version }}"
          MAIN_VERSION="${{ steps.main.outputs.version }}"

          echo "Main: $MAIN_VERSION"
          echo "PR:   $PR_VERSION"

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo ""
            echo "::error::Version in cli/Cargo.toml ($PR_VERSION) was not bumped. Every PR must bump the version."
            echo ""
            echo "Current version on main: $MAIN_VERSION"
            echo "Update the version in cli/Cargo.toml before merging."
            exit 1
          fi

          echo "Version bumped: $MAIN_VERSION -> $PR_VERSION"
